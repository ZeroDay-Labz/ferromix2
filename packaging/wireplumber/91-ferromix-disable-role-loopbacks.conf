# FerroMix2 — disable WirePlumber's role-based loopback routing.
#
# Fedora ships `media-role-nodes.conf`, which creates six loopback sinks
# (`loopback.sink.role.multimedia`, `.notification`, `.phone`, `.alarm`,
# `.ringtone`, `.alert`) and routes every PipeWire-pulse client (Spotify,
# Firefox, anything using the PulseAudio compat layer — which is most desktop
# apps) through one of them based on `media.role`, BEFORE FerroMix's own
# `target.object` routing can claim the stream. FerroMix redirects the app
# off that loopback once it appears (see the "REDIRECT" log lines), but
# removing the loopback nodes entirely is strictly better: there's nothing
# left to race against.
#
# This is why "the strip's fader/mute/DSP does nothing to Spotify" happened —
# Spotify kept playing through the untouched loopback path underneath.
#
# Install (user-level, does not need root):
#   mkdir -p ~/.config/wireplumber/wireplumber.conf.d
#   cp packaging/wireplumber/91-ferromix-disable-role-loopbacks.conf \
#      ~/.config/wireplumber/wireplumber.conf.d/
#   systemctl --user restart wireplumber wireplumber-pipewire pipewire pipewire-pulse
#
# Trade-off: this also disables Fedora's role-based ducking for EVERY app on
# the machine, not just FerroMix-managed ones — e.g. notification sounds no
# longer automatically duck music volume, and per-role volume/mute (phone
# call, alarm, etc.) no longer routes through a dedicated sink. If you rely on
# those features outside FerroMix, skip this file; FerroMix's reactive
# redirect (the "REDIRECT" log lines) still keeps routing correct either way,
# just via a cut-after-the-fact instead of never creating the stray link.
wireplumber.profiles = {
  main = {
    policy.linking.role-based.loopbacks = disabled
  }
}
